<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- tailwind or daisyUI  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- css link  -->
    <link rel="stylesheet" href="style.css">


</head>

<body>


    <section class="max-w-[520px] mx-auto card card-body shadow-xl flex justify-center items-center mt-5">

        <div class="text-center">
            <img class="block mx-auto mb-6" src="assets/github-logo.png" alt="">    
            <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
            <p class="color-gray">Sign in to manage your issues</p>
        </div>
        <!-- form   -->
        <div class="card bg-base-100 w-full shrink-0 ">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label font-semibold text-black">Enter Username</label>
                    <input id="input-Username" type="email" class="input w-full" placeholder="Username" />
                    <p class="text-primary mb-3">Default: admin</p>
 
                    <label class="label font-semibold text-black">Enter Password</label>
                    <input id="input-password" type="password" class="input w-full" placeholder="Password" />
                    <p class="text-primary">Default: admin123</p>
                    
                    <button id="login-btn" class="btn color-primary mt-4 rounded-lg">Login</button>
                </fieldset>
            </div>
        </div>

        
        
        <div class="flex gap-3">
            <span><hr class="border w-30 mt-2 text-[#E4E4E7]"></span>
            <span class="">OR</span>
            <span><hr class="border w-30 mt-2 text-[#E4E4E7]"></span>
        </div>

        <div class="bg-[#F8FAFC] shadow-sm px-30 py-5">
            <p><span class="font-bold">Username: </span>admin</p>
            <p><span class="font-bold">Password: </span>admin123</p>
        </div>
    </section>



    <script src="script/login.js"></script>
</body>

</html>
